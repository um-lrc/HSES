# Local development: builds the image from source on this machine.
# For Portainer / GHCR deployment, use docker-compose.portainer.yml instead.
#
# GEMINI_API_KEY is required in `.env` for the running container (injected at start).
# Optional at build time via build secret / build-arg; runtime env takes precedence in the app.
# Compose mounts project-root `.env` as the build secret by default. Copy from `.env.example` if needed.
# If the key lives only in `.env.local`, set `GEMINI_API_KEY_FILE=.env.local` in `.env` before `compose build`.
#
# Restart behavior:
# - `web`: `restart: unless-stopped` — Docker restarts the container if the main process exits
#   (crash, OOM kill, etc.), but not after you run `docker compose stop`.
# - Optional `autoheal` profile: restarts containers that stay unhealthy (needs Docker socket).
#   Start with: `docker compose --profile autoheal up -d`

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      secrets:
        - gemini_api_key
    ports:
      - "${WEB_PORT:-3000}:80"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    restart: unless-stopped
    init: true
    stop_grace_period: 15s
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      autoheal: "true"

  # Restarts unhealthy containers (e.g. nginx wedged). Enable with --profile autoheal.
  autoheal:
    profiles: ["autoheal"]
    image: willfarrell/autoheal:1.2.0
    restart: unless-stopped
    environment:
      AUTOHEAL_INTERVAL: 10
      AUTOHEAL_START_PERIOD: 120
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

secrets:
  gemini_api_key:
    file: ${GEMINI_API_KEY_FILE:-.env}
