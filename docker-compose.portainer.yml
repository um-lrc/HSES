# Portainer stack: pulls a pre-built image from GitHub Container Registry (GHCR).
# CI builds and redeploys via `.github/workflows/deploy.yml` on push to main.
#
# Set these in Portainer → Stack → Environment variables:
#   GEMINI_API_KEY  (required — injected into the app at container start)
#   IMAGE_TAG       (default: latest — CI sets this to the git SHA on each deploy)
#   WEB_PORT        (default: 3000 — host port mapped to container port 80)
#
# GHCR auth (required — packages are private by default):
#   Portainer → Registries → Add registry
#   URL: ghcr.io | Username: your GitHub username | Password: PAT with read:packages
#
# Make the package public (optional): GitHub → Packages → hses → Package settings → Change visibility.

services:
  web:
    image: ghcr.io/um-lrc/hses:${IMAGE_TAG:-latest}
    ports:
      - "${WEB_PORT:-3000}:80"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:?Set GEMINI_API_KEY in Portainer stack environment variables}
    restart: unless-stopped
    init: true
    stop_grace_period: 15s
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
