# Portainer stack: pulls a pre-built image from GitHub Container Registry (GHCR).
# Build and push images via `.github/workflows/docker-build.yml`.
#
# Set these in Portainer → Stack → Environment variables:
#   GEMINI_API_KEY    (required — injected into the app at container start)
#   DOCKER_IMAGE      (default: ghcr.io/um-lrc/hses)
#   DOCKER_IMAGE_TAG  (default: latest — must match a tag from the Actions build; use the commit SHA if latest is missing)
#   WEB_PORT          (default: 3000)
#
# GHCR auth (required — packages are private by default):
#   Portainer → Registries → Add registry
#   URL: ghcr.io | Username: your GitHub username | Password: PAT with read:packages
#   Then link the registry to this stack (or enable "Use default registry").
#
# Make the package public (optional): GitHub → Packages → hses → Package settings → Change visibility.

services:
  web:
    image: ${DOCKER_IMAGE:-ghcr.io/um-lrc/hses}:${DOCKER_IMAGE_TAG:-latest}
    ports:
      - "${WEB_PORT:-3000}:80"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    restart: unless-stopped
    init: true
    stop_grace_period: 15s
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
